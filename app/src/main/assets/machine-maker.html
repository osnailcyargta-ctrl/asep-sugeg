function validateFastTimerPrinter(comps, wires) {
  const timer = comps.find(c => c.type === 'timer_gate');
  if (!timer) return { ok:false, msg:'Missing Timer' };
  if ((timer.data.intervalSec ?? 3) > 3) return { ok:false, msg:'Timer interval harus ≤ 3 detik' };
  const usb = comps.find(c => c.type === 'usb_porter');
  if (!usb) return { ok:false, msg:'Missing USB Porter' };
  if (!usb.data.fileLoaded) return { ok:false, msg:'USB Porter belum ada data yang di-load' };
  const fc = comps.find(c => c.type === 'file_connector');
  if (!fc) return { ok:false, msg:'Missing File Input Connector' };
  const printer = comps.find(c => c.type.startsWith('printer_omega'));
  if (!printer) return { ok:false, msg:'Missing Printer Chipset Omega' };
  if (!isConnected(wires,'usb_porter','file_connector',comps)) return { ok:false, msg:'USB Porter not connected to File Input Connector' };
  if (!isConnected(wires,'file_connector',printer.type,comps)) return { ok:false, msg:'File Input Connector not connected to Printer Chipset' };
  if (!isConnected(wires,'timer_gate',null,comps)) return { ok:false, msg:'Timer harus terhubung ke jalur mesin' };
  return { ok:true };
}

function validateDetectorPortalTrap(comps, wires) {
  const det = comps.find(c => c.type === 'detector');
  if (!det) return { ok:false, msg:'Missing Detector' };
  const mover = comps.find(c => c.type.startsWith('mover_') || c.type.startsWith('sticky_mover'));
  if (!mover) return { ok:false, msg:'Missing Mover' };
  const cube = comps.find(c => c.type === 'cube');
  if (!cube) return { ok:false, msg:'Missing Cube' };
  if (!isConnected(wires,'detector',mover.type,comps)) return { ok:false, msg:'Detector not connected to Mover' };
  if (!isConnected(wires,mover.type,'cube',comps)) return { ok:false, msg:'Mover not connected to Cube' };
  const portalCheck = validatePortalPairOnly(comps, wires);
  if (!portalCheck.ok) return portalCheck;
  return { ok:true };
}

function validateAutoPortalLogistics(comps, wires) {
  const timer = comps.find(c => c.type === 'timer_gate');
  if (!timer) return { ok:false, msg:'Missing Timer' };
  const mover = comps.find(c => c.type.startsWith('mover_') || c.type.startsWith('sticky_mover'));
  if (!mover) return { ok:false, msg:'Missing Mover' };
  const cube = comps.find(c => c.type === 'cube');
  if (!cube) return { ok:false, msg:'Missing Cube' };
  if (!isConnected(wires,'timer_gate',mover.type,comps)) return { ok:false, msg:'Timer not connected to Mover' };
  if (!isConnected(wires,mover.type,'cube',comps)) return { ok:false, msg:'Mover not connected to Cube' };
  const portalCheck = validatePortalPairOnly(comps, wires);
  if (!portalCheck.ok) return portalCheck;
  return { ok:true };
}

function validateMiniFactory(comps, wires) {
  const timers = comps.filter(c => c.type === 'timer_gate');
  if (!timers.length) return { ok:false, msg:'Missing Timer' };
  const mover = comps.find(c => c.type.startsWith('mover_') || c.type.startsWith('sticky_mover'));
  if (!mover) return { ok:false, msg:'Missing Mover' };
  const cube = comps.find(c => c.type === 'cube');
  if (!cube) return { ok:false, msg:'Missing Cube' };
  if (!isConnected(wires,'timer_gate',mover.type,comps)) return { ok:false, msg:'Timer not connected to Mover (jalur logistik)' };
  if (!isConnected(wires,mover.type,'cube',comps)) return { ok:false, msg:'Mover not connected to Cube' };
  const portalCheck = validatePortalPairOnly(comps, wires);
  if (!portalCheck.ok) return portalCheck;

  const usb = comps.find(c => c.type === 'usb_porter');
  if (!usb) return { ok:false, msg:'Missing USB Porter (jalur printer)' };
  const fc = comps.find(c => c.type === 'file_connector');
  if (!fc) return { ok:false, msg:'Missing File Input Connector' };
  const printer = comps.find(c => c.type.startsWith('printer_'));
  if (!printer) return { ok:false, msg:'Missing Printer Chipset' };
  if (!isConnected(wires,'usb_porter','file_connector',comps)) return { ok:false, msg:'USB Porter not connected to File Input Connector' };
  if (!isConnected(wires,'file_connector',printer.type,comps)) return { ok:false, msg:'File Input Connector not connected to Printer Chipset' };
  if (!isConnected(wires,'timer_gate',null,comps)) return { ok:false, msg:'Timer harus terhubung ke jalur printer juga' };
  return { ok:true };
}

// ══════════════════════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════════════════════
function submitMachine() {
  if (S.sandboxMode || storyIndex >= STORY.length) return;
  const order = STORY[storyIndex];
  const result = order.check(S.components, S.wires);
  if (!result.ok) {
    toast('❌ ' + result.msg, 'error');
    showModal({
      title: '❌ Order Failed',
      body: `<p>Your machine doesn't meet the requirements:</p><p class="highlight">${result.msg}</p><p>Keep building and try again!</p>`,
      buttons:[{label:'OK', action:'close'}],
    });
    return;
  }
  if (S.orderTimer) clearInterval(S.orderTimer);
  const elapsed = S.orderElapsed;
  const [minR, maxR] = order.reward;
  const timeLimit = order.timeLimit;
  const ratio = Math.max(0, 1 - elapsed / timeLimit);
  const reward = Math.round(minR + ratio * (maxR - minR));
  S.money += reward;
  updateMoney();

  const prevIndex = storyIndex;
  storyIndex++;

  showModal({
    title: '✅ Order Complete!',
    body: `<p><span class="highlight">${order.customer}</span> menerima mesinnya!</p>
           <p>Waktu: <span class="highlight">${elapsed}s</span></p>
           <p>Reward: <span class="highlight">+$${reward}</span></p>
           ${storyIndex < STORY.length ? `<p>Customer berikutnya sudah menunggu...</p>` : `<p style="color:var(--green)">Semua order selesai! Selamat!</p>`}`,
    buttons:[{label:'▶ NEXT', action:'close', cls:'success'}],
    onClose: () => {
      renderCustomerBox();
      renderShop();
    }
  });
}

// ══════════════════════════════════════════════════════
//  MONEY
// ══════════════════════════════════════════════════════
function updateMoney() {
  document.getElementById('money-display').textContent = S.money;
}

// ══════════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════════
function showModal({title, body, buttons=[], onClose=null}) {
  const container = document.getElementById('modal-container');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <h2>${title}</h2>
    ${body}
    <div class="modal-btns">
      ${buttons.map((b,i) => `<button class="modal-btn ${b.cls||''}" data-idx="${i}">${b.label}</button>`).join('')}
    </div>
  </div>`;
  overlay.querySelectorAll('.modal-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const b = buttons[+btn.dataset.idx];
      overlay.remove();
      if (onClose) onClose();
      if (b && b.action && b.action !== 'close') b.action();
    });
  });
  container.appendChild(overlay);
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
let toastTimer = null;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' '+type : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className='', 2500);
}

// ══════════════════════════════════════════════════════
//  INTRO MODAL
// ══════════════════════════════════════════════════════
function showIntro() {
  showModal({
    title: '⚙ MACHINE MAKER',
    body: `<p>Selamat datang! Kamu adalah insinyur mesin.</p>
           <p>Drag komponen dari <span class="highlight">SHOP</span> ke canvas, sambungkan port output <span style="color:var(--accent2)">●</span> ke input <span style="color:var(--accent)">●</span> dengan klik-drag kabel.</p>
           <p>Customer pertamamu adalah <span class="highlight">Sugeng</span> — dia minta printer alpha 1.12.</p>
           <p><span class="highlight">Tips:</span> Klik component untuk lihat propertinya. Klik kabel untuk hapus. ESC cancel wiring.</p>`,
    buttons:[{label:'▶ MULAI', action:'close', cls:'success'}],
  });
}

// ══════════════════════════════════════════════════════
//  TOUCH SUPPORT
// ══════════════════════════════════════════════════════

const ghost = document.getElementById('drag-ghost');
let shopTouchType = null; // type being dragged from shop

// ── Shop item: ghost drag from shop → drop on canvas ──
function startShopTouchDrag(type, def, cx, cy) {
  shopTouchType = type;
  ghost.innerHTML = `${def.icon}<span style="font-size:8px;margin-top:2px">${def.label}</span>`;
  ghost.style.width  = (def.w * CELL) + 'px';
  ghost.style.height = (def.h * CELL) + 'px';
  ghost.className = 'visible';
  moveGhost(cx, cy);
  // after ghost activates, block page scroll via a non-passive listener
  document.addEventListener('touchmove', preventScrollDuringDrag, {passive:false});
}

function preventScrollDuringDrag(e) {
  if (shopTouchType) e.preventDefault();
  else document.removeEventListener('touchmove', preventScrollDuringDrag);
}

function moveGhost(cx, cy) {
  ghost.style.left = (cx - ghost.offsetWidth/2)  + 'px';
  ghost.style.top  = (cy - ghost.offsetHeight/2) + 'px';
}

document.addEventListener('touchmove', e => {
  const t = e.touches[0];

  // shop ghost drag — only block scroll when ghost is showing
  if (shopTouchType) {
    e.preventDefault();
    moveGhost(t.clientX, t.clientY);
    return;
  }

  // comp move
  if (S.dragging) {
    e.preventDefault();
    const rect = document.getElementById('game-canvas').getBoundingClientRect();
    const comp = S.components.find(c => c.id === S.dragging.compId);
    if (!comp) return;
    const rawX = t.clientX - rect.left - S.dragging.offsetX;
    const rawY = t.clientY - rect.top  - S.dragging.offsetY;
    const def = COMP_DEFS[comp.type];
    comp.x = Math.max(0, Math.min((CANVAS_W-def.w)*CELL, Math.round(rawX/CELL)*CELL));
    comp.y = Math.max(0, Math.min((CANVAS_H-def.h)*CELL, Math.round(rawY/CELL)*CELL));
    const el = document.getElementById(comp.id);
    if (el) { el.style.left=comp.x+'px'; el.style.top=comp.y+'px'; }
    renderWires();
    return;
  }

  // wire preview via touch
  if (S.wiringFrom) {
    e.preventDefault();
    const rect = document.getElementById('game-canvas').getBoundingClientRect();
    S.mouseX = t.clientX - rect.left;
    S.mouseY = t.clientY - rect.top;
    updateWirePreview();
  }
}, {passive:false});

document.addEventListener('touchend', e => {
  const t = e.changedTouches[0];

  // drop shop item on canvas
  if (shopTouchType) {
    ghost.className = '';
    document.removeEventListener('touchmove', preventScrollDuringDrag);
    const type = shopTouchType;
    shopTouchType = null;
    const def = COMP_DEFS[type];
    if (!def) return;
    if (!S.sandboxMode && S.money < def.price) { toast('Not enough money!','error'); return; }
    // check if finger is over game-canvas
    const gcRect = document.getElementById('game-canvas').getBoundingClientRect();
    if (t.clientX < gcRect.left || t.clientX > gcRect.right ||
        t.clientY < gcRect.top  || t.clientY > gcRect.bottom) {
      toast('Drop onto the canvas!', '');
      return;
    }
    const rawX = t.clientX - gcRect.left;
    const rawY = t.clientY - gcRect.top;
    const gx = Math.round(rawX/CELL) - Math.floor(def.w/2);
    const gy = Math.round(rawY/CELL) - Math.floor(def.h/2);
    const x = Math.max(0, Math.min(CANVAS_W-def.w, gx)) * CELL;
    const y = Math.max(0, Math.min(CANVAS_H-def.h, gy)) * CELL;
    saveUndo();
    if (!S.sandboxMode && def.price > 0) { S.money -= def.price; updateMoney(); }
    spawnComponent(type, x, y);
    renderShop();
    return;
  }

  // end comp move
  if (S.dragging) { S.dragging = null; return; }

  // end wire via touch (find port under finger)
  if (S.wiringFrom) {
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (el && el.classList.contains('port')) {
      const compId  = el.dataset.compId;
      const portType = el.dataset.portType;
      if (portType === 'input' && compId !== S.wiringFrom.compId) {
        createWire(S.wiringFrom.compId, compId);
      }
      cancelWiring();
    }
    return;
  }
});

// ── Comp touch drag start ──
function onCompTouchStart(e) {
  if (e.target.classList.contains('port')) return;
  e.stopPropagation();
  // don't preventDefault here — let click still fire for button/select
  const t = e.touches[0];
  const el = e.currentTarget;
  const comp = S.components.find(c => c.id === el.id);
  if (!comp) return;
  const rect = document.getElementById('game-canvas').getBoundingClientRect();
  S.dragging = {
    compId: comp.id,
    offsetX: t.clientX - rect.left - comp.x,
    offsetY: t.clientY - rect.top  - comp.y,
  };
}

// ── Port touch wiring start ──
function onPortTouchStart(e) {
  e.stopPropagation();
  e.preventDefault();
  const port = e.currentTarget;
  const compId  = port.dataset.compId;
  const portType = port.dataset.portType;

  if (!S.wiringFrom) {
    if (portType === 'output') {
      S.wiringFrom = { compId, portType };
      port.style.boxShadow = '0 0 8px var(--yellow)';
      showWirePreview();
      toast('Tap an INPUT port to connect', '');
    }
  } else {
    if (portType === 'input' && compId !== S.wiringFrom.compId) {
      createWire(S.wiringFrom.compId, compId);
      cancelWiring();
    } else {
      cancelWiring();
    }
  }
}

// ── Button / detector tap via touchend ──
document.getElementById('game-canvas').addEventListener('touchend', e => {
  if (S.dragging || shopTouchType || S.wiringFrom) return;
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if (!el) return;
  const compEl = el.closest('.comp');
  if (!compEl) return;
  const comp = S.components.find(c => c.id === compEl.id);
  if (!comp) return;
  if (comp.type === 'button') { activateComponent(comp.id); }
  selectComp(comp.id);
}, {passive:true});

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
//  SAVE / LOAD
//  Uses Android internal file storage (window.AndroidStorage bridge)
//  when running inside the WebView wrapper app. Falls back to
//  browser localStorage when opened as a plain HTML file.
// ══════════════════════════════════════════════════════
const SAVE_KEY = 'machine_maker_save_v1';
const HAS_ANDROID_BRIDGE = (typeof window.AndroidStorage !== 'undefined');

function serializeState() {
  return {
    version: 1,
    savedAt: Date.now(),
    mode: S.mode,
    money: S.money,
    storyIndex: storyIndex,
    nextId: S.nextId,
    components: S.components,
    wires: S.wires,
    portalPair: S.portalPair,
  };
}

function saveGame() {
  try {
    const data = serializeState();
    const json = JSON.stringify(data);
    if (HAS_ANDROID_BRIDGE) {
      const result = window.AndroidStorage.saveData(SAVE_KEY, json);
      if (result !== 'OK') { toast('❌ Gagal save: ' + result, 'error'); return; }
    } else {
      localStorage.setItem(SAVE_KEY, json);
    }
    toast('💾 Game saved!', 'success');
  } catch (err) {
    toast('❌ Gagal save: ' + err.message, 'error');
  }
}

function loadGame() {
  let raw;
  try {
    raw = HAS_ANDROID_BRIDGE ? window.AndroidStorage.loadData(SAVE_KEY) : localStorage.getItem(SAVE_KEY);
  } catch (err) {
    toast('❌ Gagal akses storage: ' + err.message, 'error');
    return;
  }
  if (!raw) { toast('Tidak ada save data ditemukan', 'error'); return; }
  let data;
  try {
    data = JSON.parse(raw);
  } catch (err) {
    toast('❌ Save data korup', 'error');
    return;
  }
  applyLoadedState(data);
  toast('📂 Game loaded!', 'success');
}

function applyLoadedState(data) {
  // stop everything currently running
  stopAllTimers();
  cancelPortalSelect();
  if (S.orderTimer) { clearInterval(S.orderTimer); S.orderTimer = null; }
  S.components.forEach(c => { const el = document.getElementById(c.id); if (el) el.remove(); });
  document.getElementById('wire-layer').innerHTML = '';

  S.money = data.money ?? 500;
  S.nextId = data.nextId ?? 1;
  S.components = data.components || [];
  S.wires = data.wires || [];
  S.portalPair = data.portalPair || null;
  S.selected = null;
  S.undoStack = [];
  storyIndex = data.storyIndex ?? 0;

  S.components.forEach(c => renderComponent(c));
  S.components.filter(c => c.type === 'timer_gate').forEach(startTimerComp);

  updatePortConnected();
  renderWires();
  updateMoney();
  setMode(data.mode === 'sandbox' ? 'sandbox' : 'career');
}

function init() {
  initCanvas();
  renderShop();
  renderCustomerBox();
  updateMoney();
  if (HAS_ANDROID_BRIDGE) {
    try {
      const raw = window.AndroidStorage.loadData(SAVE_KEY);
      if (raw) {
        applyLoadedState(JSON.parse(raw));
        toast('📂 Save data dimuat', 'success');
        return;
      }
    } catch (e) { /* ignore, fall through to fresh start */ }
  }
  showIntro();
}

init();
</script>

  <h4>👁 Visibility</h4>
  <div id="hide-list"></div>

</div>
